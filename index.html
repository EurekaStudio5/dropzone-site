<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🔒 Protected</title>
<meta name="robots" content="noindex,nofollow" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,-apple-system,"Noto Sans JP",sans-serif;
    min-height:100vh;display:grid;place-items:center;color:#eef1ff;
    background:radial-gradient(900px 700px at 80% -10%,rgba(124,92,255,.28),transparent 60%),
               radial-gradient(800px 600px at -10% 40%,rgba(33,212,253,.20),transparent 55%),#0b0d17}
  .card{width:min(380px,92vw);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
    backdrop-filter:blur(14px);border-radius:24px;padding:38px 30px;text-align:center;
    box-shadow:0 30px 80px rgba(0,0,0,.45)}
  .lock{font-size:46px;filter:drop-shadow(0 8px 22px rgba(124,92,255,.6))}
  h1{font-size:20px;margin:14px 0 4px;font-weight:800}
  p{color:#9aa3c7;font-size:13px;line-height:1.6;margin-bottom:22px}
  form{display:flex;flex-direction:column;gap:12px}
  input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.14);
    background:rgba(0,0,0,.25);color:#fff;font-size:16px;outline:none;transition:.2s;text-align:center;letter-spacing:2px}
  input:focus{border-color:#7c5cff;box-shadow:0 0 0 3px rgba(124,92,255,.25)}
  button{padding:14px;border:none;border-radius:14px;font-weight:800;font-size:15px;cursor:pointer;color:#fff;
    background:linear-gradient(135deg,#7c5cff,#21d4fd);box-shadow:0 10px 30px rgba(124,92,255,.45);transition:.2s}
  button:hover{transform:translateY(-2px)}
  button:disabled{opacity:.6;cursor:wait;transform:none}
  .err{color:#ff6b8a;font-size:13px;min-height:18px;font-weight:600}
  .shake{animation:sh .4s}
  @keyframes sh{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
</style>
</head>
<body>

    <h1>このサイトは保護されています</h1>

    <form id="f">

      <div class="err" id="err"></div>

  const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const f = document.getElementById('f');
  const pw = document.getElementById('pw');
  const err = document.getElementById('err');
  const go = document.getElementById('go');
  const card = document.getElementById('card');

  async function unlock(password){
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    const aesKey = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b64(DATA.salt), iterations:DATA.iter, hash:'SHA-256' },
      baseKey, { name:'AES-GCM', length:256 }, true, ['decrypt']);
    const pageBuf = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(DATA.pageIv) }, aesKey, b64(DATA.page));
    const rawKey = await crypto.subtle.exportKey('raw', aesKey);
    const keyB64 = btoa(String.fromCharCode(...new Uint8Array(rawKey)));
    let html = new TextDecoder().decode(pageBuf);
    html = html.split('__KEYB64__').join(keyB64);   // hand the key to the page so it can decrypt assets
    return html;
  }

  f.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.textContent = ''; go.disabled = true; go.textContent = '解錠中…';
    try {
      const html = await unlock(pw.value);
      document.open(); document.write(html); document.close();
    } catch (_) {
      go.disabled = false; go.textContent = '解錠する';
      err.textContent = 'パスワードが違います';
      card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
      pw.value = ''; pw.focus();
    }
  });
</script>
